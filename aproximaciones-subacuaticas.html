<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aproximaciones subacuáticas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap"
        rel="stylesheet">
    <link href="styles/main.css" rel="stylesheet">

</head>

<body>

    <!-- Mobile top bar -->
    <div class="topbar">
        <span class="topbar-title">Aproximaciones subacuáticas</span>
        <button class="hamburger" id="menuToggle" aria-label="Menú">
            <span></span><span></span><span></span>
        </button>
    </div>

    <div class="page-wrap">

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <p class="sidebar-title">APROXIMACIONES SUBACUÁTICAS</p>
            <ul class="sidebar-nav">
                <li><a href="./aproximaciones-subacuaticas/about.html">ABOUT</a></li>
                <li><a href="#proceso">PROCESO</a></li>
                <li><a href="#publicacion">PUBLICACIÓN</a></li>
                <li class="has-submenu">
                    <a href="#metafora" class="submenu-toggle">NADA COMO UNA<br>METÁFORA</a>
                    <ul class="submenu">
                        <li><a href="#metafora-1">Submenu 1</a></li>
                        <li><a href="#metafora-2">Submenu 2</a></li>
                        <li><a href="#metafora-3">Submenu 3</a></li>
                    </ul>
                </li>
            </ul>
        </aside>

        <!-- Main content -->
                <main class="content-area">
            <div class="video-wrapper">
                <div class="video-ratio">
                    <iframe
                        src="https://player.vimeo.com/video/1170076973?autoplay=1&muted=0&loop=1&byline=0&portrait=0&title=0"
                        frameborder="0"
                        allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share"
                        referrerpolicy="strict-origin-when-cross-origin"
                        title="Llluvia Metropolitana (2026)">
                    </iframe>
                </div>
            </div>
        </main>

    </div>

    <script src="https://player.vimeo.com/api/player.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        const toggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');

        toggle.addEventListener('click', () => {
            sidebar.classList.toggle('open');
            toggle.classList.toggle('open');
        });

        sidebar.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                sidebar.classList.remove('open');
                toggle.classList.remove('open');
            });
        });

        // Submenu toggle
        const submenuToggle = document.querySelector('.submenu-toggle');
        const submenu = document.querySelector('.submenu');

        if (submenuToggle && submenu) {
            submenuToggle.addEventListener('click', (e) => {
                e.preventDefault();
                submenu.classList.toggle('open');
            });
        }
    </script>
</body>

</html>
